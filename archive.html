---
layout: page
title: Archive
permalink: /archive/
---

<input type="text" id="search" placeholder="Find some articles here" />

{% for post in site.posts %}
  {% assign currentDate = post.date | date: "%Y" %}
  {% if currentDate != previousDate %}
    <h2>{{ currentDate }}</h2>
    {% assign previousDate = currentDate %}
  {% endif %}

  <article>
    <a href="{{ post.url }}">{{ post.title }}</a>
  </article>
{% endfor %}
